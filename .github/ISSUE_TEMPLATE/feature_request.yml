name: Feature request
description: Suggest an improvement or a new capability.
title: "[Feature]: "
labels: ["enhancement", "awaiting triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please keep in mind this is a **beta / research preview**,
        so the roadmap is intentionally narrow. Do not include secrets or private paths.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what makes it hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? An API shape, UI, or config sketch helps.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API
        - WebUI
        - Deploy / Docker / Compose
        - Docs
        - Other
    validations:
      required: true
