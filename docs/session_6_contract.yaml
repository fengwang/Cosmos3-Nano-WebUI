session_contract:
  id: MIG-S6
  objective: Build local Docker/Compose support using external weights and the pinned public vLLM-Omni fork.
  risk_level: high
  routing: worker_plus_reviewers
  in_scope:
    - Add or migrate API, WebUI, and vLLM-Omni Dockerfiles.
    - Consume the pinned public vLLM-Omni commit from MIG-S2.
    - Add FP8 and NVFP4 local-build Compose files.
    - Use configurable checkpoint path environment variables.
    - Render Compose without private paths.
    - Build local images from public inputs where feasible.
    - Record manual GPU smoke results if hardware and checkpoints are available.
  out_of_scope:
    - Registry publishing.
    - Runtime checkpoint auto-download.
    - GPU GitHub Actions.
    - README rewrite beyond handoff notes.
  blast_radius:
    allowed_files:
      - deploy/**
      - .dockerignore
      - Dockerfile
      - docker-compose*.yml
      - Makefile
      - .env.example
      - docs/session_6/**
      - docs/evidence_map.md
      - docs/risk_register.md
      - docs/eval_seed_cases.md
    forbidden_files:
      - model weight files
      - generated media files
      - Docker publishing workflows
      - GitHub secrets
      - README.md
      - vLLM-Omni fork source
  invariants:
    - Docker images do not contain checkpoint weights.
    - Compose mounts checkpoint directories supplied by the operator.
    - vLLM-Omni is installed from the pinned public fork commit or tag.
    - Compose examples do not reference private paths.
  acceptance_criteria:
    - FP8 and NVFP4 Compose configs render.
    - Dockerfiles build from public inputs or failures are classified.
    - Private-reference and weight-copy scans pass.
    - Manual GPU smoke is recorded or explicitly deferred to MIG-S8.
  deterministic_checks:
    - "rtk docker compose -f deploy/docker-compose.fp8.yml config"
    - "rtk docker compose -f deploy/docker-compose.nvfp4.yml config"
    - "rtk rg -n \"$PRIVATE_REF_PATTERN\" deploy docs .env.example"
    - "rtk rg -n \"COPY .*\\.(safetensors|pt|pth|ckpt)|ADD .*\\.(safetensors|pt|pth|ckpt)\" deploy"
    - "rtk docker build -f deploy/api.Dockerfile -t cosmos3-nano-api:local ."
    - "rtk docker build -f deploy/webui.Dockerfile -t cosmos3-nano-webui:local ."
  review_axes:
    - correctness
    - security
    - tests
    - architecture
    - performance
  adversarial_cases:
    - Dockerfile copies weights through a broad `COPY .`.
    - Compose renders but points at a private default path.
    - vLLM-Omni pin is mutable or branch-only.
    - API and WebUI containers can only run on a private network setup.
  failure_modes_to_watch:
    - Public base image changes break local build.
    - Build context is too large because exclusions are missing.
    - External checkpoint mount layout conflicts with HF artifact layout.
  done_condition: GATE-MIG-S6-DOCKER passes with local-build Compose ready for README documentation.
  handoff_requirements:
    - Dockerfile paths.
    - Compose file paths.
    - Environment variables.
    - vLLM-Omni pin.
    - Build/render results.
    - Manual GPU caveats.
  eval_seed_candidates:
    - EV-MIG-COMPOSE-RENDER
    - EV-MIG-GPU-FP8-T2V
    - EV-MIG-GPU-NVFP4-SURFACE

