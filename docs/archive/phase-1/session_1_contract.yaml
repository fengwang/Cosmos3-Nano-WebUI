session_contract:
  id: MIG-S1
  objective: Lock the public migration baseline, import/exclusion rules, evidence policy, and scrub checklist.
  risk_level: low
  routing: single_agent
  in_scope:
    - Record public repo branch, remotes, file tree, and docs baseline.
    - Record public target remotes for WebUI/API, vLLM-Omni, and HF checkpoints.
    - Define curated import and exclusion manifests.
    - Define private-reference scrub patterns and release-blocking scans.
    - Update evidence and risks if public baseline facts drift.
  out_of_scope:
    - Source import.
    - vLLM-Omni rebase.
    - Docker changes.
    - README rewrite.
    - GPU or checkpoint validation.
  blast_radius:
    allowed_files:
      - docs/session_1/**
      - docs/evidence_map.md
      - docs/risk_register.md
      - docs/eval_seed_cases.md
    forbidden_files:
      - api/**
      - webui/**
      - deploy/**
      - tools/**
      - schemas/**
      - .github/**
      - README.md
      - model weight or generated media files
  invariants:
    - Public docs cite only public remotes, repo files, commands run during migration, and owner decisions.
    - No private source path or private evidence is committed.
    - Import rules must exclude model weights, generated media, caches, archives, and legacy submodules by default.
  acceptance_criteria:
    - Public repo baseline is recorded.
    - Import and exclusion manifests exist.
    - Scrub command set exists and is usable by later sessions.
    - Evidence and risk docs match the public baseline.
  deterministic_checks:
    - "rtk git status --short --branch"
    - "rtk git remote -v"
    - "rtk rg --files"
    - "rtk git ls-remote git@github.com:fengwang/Cosmos3-Nano-WebUI.git HEAD 'refs/heads/*'"
    - "rtk git ls-remote git@github.com:fengwang/vllm-omni.git HEAD 'refs/heads/*'"
    - "rtk rg -n \"$PRIVATE_REF_PATTERN\" ."
  review_axes:
    - correctness
    - security
    - tests
    - architecture
    - performance
  adversarial_cases:
    - Import manifest accidentally allows weights or generated videos.
    - Scrub pattern misses private hostnames or local-only absolute paths.
    - Evidence map cites non-public source evidence.
    - Session scope is too vague for a later worker to execute.
  failure_modes_to_watch:
    - Baseline commands rely on unpushed local branch state.
    - Exclusion rules block files required by runtime import.
    - Evidence rows overstate what public checks proved.
  done_condition: GATE-MIG-S1-SCOPE passes and MIG-S2/MIG-S3 have a clear public-safe starting point.
  handoff_requirements:
    - Import manifest.
    - Exclusion manifest.
    - Scrub pattern and command list.
    - Public baseline evidence updates.
  eval_seed_candidates:
    - EV-MIG-REPO-TREE
    - EV-MIG-SCRUB

