session_contract:
  id: MIG-S2
  objective: Rebase or merge the Cosmos3 vLLM-Omni patch line into the GitHub fork and pin a public commit or tag.
  risk_level: high
  routing: branch_and_compare
  in_scope:
    - Confirm the GitHub vLLM-Omni fork base.
    - Apply the authorized Cosmos3 patch series to a fork branch.
    - Resolve conflicts in Cosmos3, checkpoint adapter, and quantization code.
    - Run deterministic vLLM-Omni tests and compile checks.
    - Push or prepare a public branch, commit, or tag for WebUI consumption.
    - Record dependency pin and install instructions.
  out_of_scope:
    - WebUI/API source import.
    - Checkpoint artifact verification.
    - Docker image publishing.
    - Upstream PR creation unless separately approved.
  blast_radius:
    allowed_files:
      - external vllm-omni fork repository branches
      - external vllm-omni fork tests for touched surfaces
      - docs/session_2/**
      - docs/evidence_map.md
      - docs/risk_register.md
    forbidden_files:
      - WebUI repo runtime source outside docs
      - model weight files
      - Docker publishing workflows
      - GitHub secrets or registry credentials
  invariants:
    - WebUI repo consumes only a public vLLM-Omni commit or tag.
    - The fork pin must be reproducible from public GitHub state.
    - Test failures are classified before source changes are expanded.
  acceptance_criteria:
    - Public vLLM-Omni pin exists.
    - Targeted deterministic tests pass or failures have owner disposition.
    - Install command for the pinned fork is recorded.
    - Evidence and risk docs reflect the rebase result.
  deterministic_checks:
    - "rtk git status --short --branch"
    - "rtk git remote -v"
    - "rtk git log --oneline -n 20"
    - "rtk python -m compileall vllm_omni"
    - "rtk pytest -q tests/diffusion/model_loader/test_modelopt_native.py tests/diffusion/model_loader/test_modelopt_native_fp8_w8a16.py tests/diffusion/model_loader/test_modelopt_native_nvfp4.py tests/diffusion/models/cosmos3/test_cosmos3_nvfp4_load_guard.py tests/diffusion/quantization/test_fp8_blockwise_w8a16.py tests/diffusion/quantization/test_nvfp4_blockwise_config.py"
  review_axes:
    - correctness
    - security
    - tests
    - architecture
    - performance
  adversarial_cases:
    - Patch appears rebased but the public fork does not contain it.
    - Merge accidentally drops a Cosmos3 adapter or guard.
    - Tests pass because they do not cover touched files.
    - WebUI pin points to a local branch name instead of a public commit or tag.
  failure_modes_to_watch:
    - Upstream Cosmos3 changes conflict semantically with patch behavior.
    - Fork test suite is too expensive or environment-sensitive.
    - Public branch is pushed without a stable pin.
  done_condition: GATE-MIG-S2-VLLM passes with a public vLLM-Omni pin ready for WebUI Docker/build config.
  handoff_requirements:
    - Public commit or tag.
    - Install command.
    - Test result summary.
    - Conflict resolution notes.
    - Known runtime caveats.
  eval_seed_candidates:
    - EV-MIG-VLLM-FORK
